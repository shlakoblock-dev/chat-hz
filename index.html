<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>чат хз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0b1120;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        #app {
            width: 100%;
            max-width: 1300px;
            height: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            overflow: hidden;
        }
        
        /* Боковая панель со списком чатов */
        .rooms-panel {
            width: 280px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .rooms-header {
            padding: 20px 16px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #0f172a;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rooms-header button {
            background: #3b82f6;
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 30px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .rooms-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .room-item {
            padding: 12px 16px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .room-item.active {
            background: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
        .room-item .room-name {
            font-weight: 500;
            word-break: break-word;
        }
        .room-actions {
            display: flex;
            gap: 6px;
        }
        .room-actions button {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 20px;
            opacity: 0.6;
        }
        .room-actions button:hover {
            opacity: 1;
            background: rgba(0,0,0,0.05);
        }
        .add-room {
            padding: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .add-room input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            margin-bottom: 8px;
        }
        .add-room button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }
        .chat-header {
            padding: 16px 24px;
            background: #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .chat-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            flex: 1;
        }
        .current-room-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
        }
        
        /* Панель авторизации и имени */
        .auth-bar {
            background: #f1f5f9;
            padding: 12px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .auth-fields {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 4px 8px;
            border-radius: 50px;
            border: 1px solid #cbd5e1;
        }
        .auth-fields input {
            padding: 8px 12px;
            border: none;
            border-radius: 30px;
            background: #f8fafc;
            width: 130px;
            outline: none;
        }
        .auth-fields button {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            background: #3b82f6;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        #logoutBtn {
            background: #94a3b8;
        }
        .name-field {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .name-field input {
            padding: 8px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            width: 140px;
        }
        .name-field button {
            padding: 8px 16px;
            background: #64748b;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }
        .user-greeting {
            font-weight: 500;
            color: #0f172a;
        }
        
        /* Сообщения */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafcff;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 22px;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
        }
        .message.own {
            align-self: flex-end;
            background: #dcf8c6;
        }
        .message.other {
            align-self: flex-start;
            background: white;
            border: 1px solid #e2e8f0;
        }
        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }
        .msg-name {
            font-weight: 700;
            color: #2563eb;
        }
        .msg-login {
            color: #64748b;
            font-size: 0.75rem;
        }
        .msg-time {
            color: #94a3b8;
            font-size: 0.7rem;
            margin-left: auto;
        }
        .msg-text {
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .file-attachment {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.02);
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .file-attachment img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
        }
        .file-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .msg-delete {
            position: absolute;
            top: 2px;
            right: 8px;
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
        }
        .message.own:hover .msg-delete {
            display: block;
        }
        
        /* Панель ввода */
        .input-panel {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        #messageInput {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            min-width: 200px;
        }
        .file-btn {
            background: #64748b;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        #sendBtn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        #sendBtn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }
        .info-line {
            text-align: center;
            color: #64748b;
            padding: 16px;
            font-style: italic;
        }
        
        /* Мобильная версия */
        @media (max-width: 700px) {
            #app {
                flex-direction: column;
            }
            .rooms-panel {
                width: 100%;
                height: 200px;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
            .rooms-list {
                flex-direction: row;
                overflow-x: auto;
            }
            .room-item {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Боковая панель с чатами (одна!) -->
    <div class="rooms-panel">
        <div class="rooms-header">
            <span>📱 Мои чаты</span>
            <button id="addRoomBtn">+</button>
        </div>
        <div class="rooms-list" id="roomsList"></div>
        <div class="add-room" style="display: none;" id="addRoomForm">
            <input type="text" id="newRoomInput" placeholder="код комнаты" maxlength="12">
            <button id="createRoomBtn">Создать</button>
        </div>
    </div>
    
    <!-- Основная область чата -->
    <div class="chat-area">
        <div class="chat-header">
            <h2>💬 Мессенджер</h2>
            <div class="current-room-badge" id="currentRoomDisplay">—</div>
        </div>
        
        <!-- Панель авторизации -->
        <div class="auth-bar">
            <div class="auth-fields">
                <input type="text" id="loginInput" placeholder="логин">
                <input type="password" id="passwordInput" placeholder="пароль">
                <button id="loginBtn">Войти</button>
                <button id="registerBtn">Регистрация</button>
            </div>
            <div class="name-field">
                <input type="text" id="usernameInput" placeholder="ваше имя">
                <button id="setNameBtn">ok</button>
            </div>
            <div>
                <span class="user-greeting" id="userGreeting"></span>
                <button id="logoutBtn" style="display: none;">Выйти</button>
            </div>
        </div>
        
        <!-- Сообщения -->
        <div class="messages-container" id="messagesList">
            <div class="info-line">👋 Войдите и выберите чат</div>
        </div>
        
        <!-- Ввод сообщения -->
        <div class="input-panel">
            <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
            <input type="file" id="fileInput" style="display: none;">
            <button class="file-btn" id="fileButton">📎 Файл</button>
            <button id="sendBtn" disabled>Отправить</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ===== ДАННЫЕ =====
        const STORAGE_KEY = 'chatMessages';
        const ROOMS_KEY = 'userRooms';
        const USERS_KEY = 'users';
        const SESSION_KEY = 'currentSession';
        
        let messages = [];
        let rooms = [];
        let currentUser = null;
        let currentRoom = localStorage.getItem('currentRoom') || '';
        
        // ===== ЗАГРУЗКА =====
        function loadData() {
            const msg = localStorage.getItem(STORAGE_KEY);
            messages = msg ? JSON.parse(msg) : [];
            
            const r = localStorage.getItem(ROOMS_KEY);
            rooms = r ? JSON.parse(r) : [];
            
            const session = localStorage.getItem(SESSION_KEY);
            currentUser = session ? JSON.parse(session) : null;
        }
        loadData();
        
        // ===== СОХРАНЕНИЕ =====
        function saveMessages() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }
        function saveRooms() {
            localStorage.setItem(ROOMS_KEY, JSON.stringify(rooms));
        }
        function saveSession() {
            if (currentUser) {
                localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
            } else {
                localStorage.removeItem(SESSION_KEY);
            }
        }
        
        // ===== ПОЛЬЗОВАТЕЛИ =====
        function getUsers() {
            const u = localStorage.getItem(USERS_KEY);
            return u ? JSON.parse(u) : {};
        }
        
        // ===== РЕГИСТРАЦИЯ/ВХОД =====
        window.register = function(login, pass) {
            if (!login || !pass) return alert('Введите логин и пароль');
            const users = getUsers();
            if (users[login]) return alert('Логин уже существует');
            users[login] = btoa(pass);
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            alert('Регистрация успешна');
        };
        
        window.login = function(login, pass) {
            const users = getUsers();
            if (!users[login] || users[login] !== btoa(pass)) {
                return alert('Неверный логин/пароль');
            }
            currentUser = {
                login: login,
                userId: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6)
            };
            saveSession();
            updateUI();
        };
        
        window.logout = function() {
            currentUser = null;
            saveSession();
            updateUI();
        };
        
        // ===== КОМНАТЫ =====
        function addRoom(code) {
            if (!code || !code.match(/^[A-Za-z0-9_]{3,12}$/)) {
                return alert('Код: латиница, цифры, _, 3-12 символов');
            }
            if (!rooms.find(r => r.code === code)) {
                rooms.push({ code: code, name: code });
                saveRooms();
            }
            setCurrentRoom(code);
        }
        
        function setCurrentRoom(code) {
            currentRoom = code;
            localStorage.setItem('currentRoom', code);
            updateUI();
        }
        
        function deleteRoom(code) {
            rooms = rooms.filter(r => r.code !== code);
            saveRooms();
            if (currentRoom === code) {
                currentRoom = rooms.length ? rooms[0].code : '';
                localStorage.setItem('currentRoom', currentRoom);
            }
            updateUI();
        }
        
        function renameRoom(code) {
            const newName = prompt('Новое название:', code);
            if (newName && newName.trim()) {
                const room = rooms.find(r => r.code === code);
                if (room) room.name = newName.trim();
                saveRooms();
                updateUI();
            }
        }
        
        // ===== СООБЩЕНИЯ =====
        function sendMessage() {
            if (!currentUser || !currentRoom) return;
            
            const text = document.getElementById('messageInput').value.trim();
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const name = document.getElementById('usernameInput').value.trim() || '';
            
            if (!text && !file) return;
            
            if (file && file.size > 50 * 1024 * 1024) {
                return alert('Файл больше 50 МБ');
            }
            
            const processFile = file ? new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            }) : Promise.resolve(null);
            
            processFile.then(fileData => {
                const msg = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    room: currentRoom,
                    login: currentUser.login,
                    name: name,
                    userId: currentUser.userId,
                    text: text,
                    time: Date.now()
                };
                if (file && fileData) {
                    msg.fileName = file.name;
                    msg.fileData = fileData;
                }
                messages.push(msg);
                saveMessages();
                
                document.getElementById('messageInput').value = '';
                document.getElementById('fileInput').value = '';
                renderMessages();
            });
        }
        
        function deleteMessage(msgId) {
            const index = messages.findIndex(m => m.id === msgId && m.userId === currentUser?.userId);
            if (index !== -1) {
                messages.splice(index, 1);
                saveMessages();
                renderMessages();
            }
        }
        
        function deleteFile(msgId) {
            const msg = messages.find(m => m.id === msgId && m.userId === currentUser?.userId);
            if (msg) {
                delete msg.fileName;
                delete msg.fileData;
                saveMessages();
                renderMessages();
            }
        }
        
        // ===== ОТРИСОВКА =====
        function renderRooms() {
            const container = document.getElementById('roomsList');
            if (!rooms.length) {
                container.innerHTML = '<div class="info-line">Создайте чат</div>';
                return;
            }
            
            let html = '';
            rooms.forEach(room => {
                const active = room.code === currentRoom ? 'active' : '';
                const displayName = room.name || room.code;
                html += `
                    <div class="room-item ${active}" data-code="${room.code}">
                        <span class="room-name">${escapeHtml(displayName)}</span>
                        <div class="room-actions">
                            <button onclick="window.renameRoom('${room.code}')">✏️</button>
                            <button onclick="window.deleteRoom('${room.code}')">✕</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            document.querySelectorAll('.room-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    const code = item.dataset.code;
                    if (code) setCurrentRoom(code);
                });
            });
        }
        
        function renderMessages() {
            const container = document.getElementById('messagesList');
            
            if (!currentUser) {
                container.innerHTML = '<div class="info-line">🔑 Войдите, чтобы писать</div>';
                return;
            }
            
            if (!currentRoom) {
                container.innerHTML = '<div class="info-line">📁 Выберите чат</div>';
                return;
            }
            
            const roomMessages = messages
                .filter(m => m.room === currentRoom)
                .sort((a, b) => a.time - b.time)
                .slice(-50);
            
            if (!roomMessages.length) {
                container.innerHTML = '<div class="info-line">💬 Напишите первое сообщение</div>';
                return;
            }
            
            let html = '';
            roomMessages.forEach(msg => {
                const isOwn = msg.userId === currentUser.userId;
                const name = msg.name || 'Гость';
                const login = msg.login;
                const time = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                let fileHtml = '';
                if (msg.fileName && msg.fileData) {
                    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(msg.fileName);
                    fileHtml = `
                        <div class="file-attachment">
                            ${isImage ? `<img src="${msg.fileData}" alt="">` : ''}
                            <a href="${msg.fileData}" download="${msg.fileName}">⬇️ ${escapeHtml(msg.fileName)}</a>
                            ${isOwn ? `<button class="file-delete" onclick="window.deleteFile('${msg.id}')">🗑</button>` : ''}
                        </div>
                    `;
                }
                
                html += `
                    <div class="message ${isOwn ? 'own' : 'other'}">
                        <div class="msg-header">
                            <span class="msg-name">${escapeHtml(name)}</span>
                            <span class="msg-login">@${escapeHtml(login)}</span>
                            <span class="msg-time">${escapeHtml(time)}</span>
                        </div>
                        <div class="msg-text">${escapeHtml(msg.text)}</div>
                        ${fileHtml}
                        ${isOwn ? `<button class="msg-delete" onclick="window.deleteMessage('${msg.id}')">✕</button>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function updateUI() {
            document.getElementById('userGreeting').innerText = currentUser ? currentUser.login : '';
            document.getElementById('logoutBtn').style.display = currentUser ? 'inline-block' : 'none';
            
            const room = rooms.find(r => r.code === currentRoom);
            document.getElementById('currentRoomDisplay').innerText = room?.name || currentRoom || '—';
            
            document.getElementById('sendBtn').disabled = !(currentUser && currentRoom);
            
            renderRooms();
            renderMessages();
        }
        
        // ===== ВСПОМОГАТЕЛЬНЫЕ =====
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        // ===== ОБРАБОТЧИКИ =====
        document.getElementById('registerBtn').addEventListener('click', () => {
            const l = document.getElementById('loginInput').value;
            const p = document.getElementById('passwordInput').value;
            register(l, p);
        });
        
        document.getElementById('loginBtn').addEventListener('click', () => {
            const l = document.getElementById('loginInput').value;
            const p = document.getElementById('passwordInput').value;
            login(l, p);
        });
        
        document.getElementById('logoutBtn').addEventListener('click', logout);
        
        document.getElementById('addRoomBtn').addEventListener('click', () => {
            const form = document.getElementById('addRoomForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        });
        
        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const code = document.getElementById('newRoomInput').value;
            addRoom(code);
            document.getElementById('newRoomInput').value = '';
            document.getElementById('addRoomForm').style.display = 'none';
        });
        
        document.getElementById('setNameBtn').addEventListener('click', () => {
            // Имя сохраняется в поле, берется при отправке
            alert('Имя сохранено');
        });
        
        document.getElementById('fileButton').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Экспортируем функции в window
        window.deleteMessage = deleteMessage;
        window.deleteFile = deleteFile;
        window.renameRoom = renameRoom;
        window.deleteRoom = deleteRoom;
        
        // Синхронизация между вкладками
        window.addEventListener('storage', (e) => {
            if ([STORAGE_KEY, ROOMS_KEY, SESSION_KEY].includes(e.key)) {
                loadData();
                updateUI();
            }
        });
        
        // Инициализация
        if (!rooms.length && currentRoom) {
            rooms.push({ code: currentRoom, name: currentRoom });
            saveRooms();
        }
        updateUI();
    })();
</script>
</body>
</html>
